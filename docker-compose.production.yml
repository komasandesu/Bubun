version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      HOST: 0.0.0.0 # これを追加
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/"] # これを修正
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped